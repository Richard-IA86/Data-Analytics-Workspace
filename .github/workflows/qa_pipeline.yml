name: QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  qa:
    name: black + flake8 + mypy + pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install black flake8 mypy pytest
          pip install -r requirements.txt

      - name: black
        run: black --check .

      - name: flake8
        run: flake8 .

      - name: mypy
        run: mypy .

      - name: pytest
        run: pytest
